[keyboard]
name = "eyelash_corne keyboard"
product_name = "eyelash_corne keyboard"
vendor_id = 0x4c4b
product_id = 0x5100
manufacturer = "RMK"
chip = "nrf52840"

[layout]
rows = 4
cols = 10
layers = 1
keymap = [
    [
        ["Q", "W", "E", "R", "T", "Y", "U", "I", "O", "P"],
        ["A", "S", "D", "F", "G", "H", "J", "K", "L", "Enter"],
        ["Z", "X", "C", "V", "B", "N", "M", "Comma", "Dot", "Slash"],
        ["No", "No", "Space", "Backspace", "Tab", "Escape", "No", "No", "No", "No"]
    ]
]

[ble]
enabled = true

[split]
connection = "ble"

[split.central]
rows = 4
cols = 5
row_offset = 0
col_offset = 0

[split.central.matrix]
row_pins = ["P0_29", "P0_02", "P1_15", "P1_13"]
col_pins = ["P0_31", "P0_30", "P0_14", "P0_16", "P1_04"]

[[split.peripheral]]
rows = 4
cols = 5
row_offset = 0
col_offset = 5

[split.peripheral.matrix]
row_pins = ["P0_29", "P0_02", "P1_15", "P1_13"]
col_pins = ["P0_31", "P0_30", "P0_14", "P0_16", "P1_04"]

[host]
vial_enabled = true

[rmk]
split_peripherals_num = 1

[storage]
enabled = true
