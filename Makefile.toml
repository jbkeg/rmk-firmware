[tasks.install-llvm-tools]
install_crate = { rustup_component_name = "llvm-tools" }

[tasks.flip-link]
install_crate = { crate_name = "flip-link", binary = "flip-link", test_arg = ["-h"] }

[tasks.install-cargo-binutils]
install_crate = { crate_name = "cargo-binutils", binary = "cargo", test_arg = ["objcopy", "--help"] }

[tasks.install-hex-to-uf2]
install_crate = { crate_name = "cargo-hex-to-uf2", binary = "cargo", test_arg = ["hex-to-uf2", "--help"] }

[tasks.build-totem_left]
command = "cargo"
args = [
  "build",
  "--release",
  "--bin",
  "central",
]
env = { KEYBOARD_TOML_PATH = "${CARGO_MAKE_WORKING_DIRECTORY}/profiles/keyboard/totem.toml", VIAL_JSON_PATH = "${CARGO_MAKE_WORKING_DIRECTORY}/profiles/vial/keyboard.json" }

[tasks.objcopy-totem_left]
command = "cargo"
args = [
  "objcopy",
  "--release",
  "--bin",
  "central",
  "--",
  "-O",
  "ihex",
  "totem_left.hex",
]
env = { KEYBOARD_TOML_PATH = "${CARGO_MAKE_WORKING_DIRECTORY}/profiles/keyboard/totem.toml", VIAL_JSON_PATH = "${CARGO_MAKE_WORKING_DIRECTORY}/profiles/vial/keyboard.json" }
dependencies = ["install-llvm-tools", "flip-link", "install-cargo-binutils", "build-totem_left"]

[tasks.uf2-totem_left]
command = "cargo"
args = [
  "hex-to-uf2",
  "--input-path",
  "totem_left.hex",
  "--output-path",
  "totem_left.uf2",
  "--family",
  "nrf52840",
]
dependencies = ["install-hex-to-uf2", "objcopy-totem_left"]

[tasks.build-totem_right]
command = "cargo"
args = [
  "build",
  "--release",
  "--bin",
